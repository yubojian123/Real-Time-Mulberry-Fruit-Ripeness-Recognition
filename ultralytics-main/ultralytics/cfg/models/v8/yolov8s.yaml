# YOLOv8s.yaml
# YOLOv8 Small model configuration

# Parameters
nc: 80  # number of classes
depth_multiple: 0.33  # model depth multiple
width_multiple: 0.50  # layer channel multiple

# Backbone
backbone:
  - [3, 1, 16, 1, 1]  # [from, number, channels, stride, kernel_size]
  - [3, 2, 32, 3, 1]
  - [5, 2, 64, 3, 1]
  - [5, 3, 128, 3, 1]
  - [3, 1, 256, 3, 1]

# Head
head:
  - [1, 1, 128, 1, 1]
  - [3, 2, 256, 3, 1]
  - [3, 1, 128, 1, 1]
  - [1, 1, 256, 1, 1]
  - [3, 2, 512, 3, 1]
  - [3, 1, 256, 1, 1]
  - [1, 1, 512, 1, 1]
  - [1, 1, 256, 1, 1]
  - [1, 1, 128, 1, 1]
  - [1, 1, 256, 1, 1]

# Detect layer
detect:
  - [3, 1, 3, 1, 1]
  - [3, 1, 3, 1, 1]
  - [3, 1, 3, 1, 1]

# YOLOv8 Small model anchors
anchors:
  - [10,13, 16,30, 33,23]
  - [30,61, 62,45, 59,119]
  - [116,90, 156,198, 373,326]
